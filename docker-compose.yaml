services:
  db:
    image: postgres:18.1-alpine3.23
    container_name: database
    restart: unless-stopped
    tty: true
    environment:
      POSTGRES_DB: Conflux
      POSTGRES_PASSWORD: password
      POSTGRES_ROOT_PASSWORD: root_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d Conflux -U postgres"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 10s
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      
  application:
    build:
      context: .
      dockerfile: app.dockerfile
    container_name: application
    tty: true
    depends_on:
      "db":
        condition: service_healthy
    ports:
      - "8080:8080"
    secrets:
      - app_secrets
      - app_production_secrets

volumes:
  pgdata:

secrets:
  app_secrets:
    file: ./Conflux.Web/secrets.json
  app_production_secrets:
    file: ./Conflux.Web/secrets.Production.json
